name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish framework-dependent
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained false
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=true
          -o publish/framework-dependent

      - name: Publish self-contained portable
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=true
          -p:TrimMode=partial
          -o publish/self-contained

      - name: Create ZIPs
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish/framework-dependent/* -DestinationPath "VoiceDictation-${tag}-win-x64.zip"
          Compress-Archive -Path publish/self-contained/* -DestinationPath "VoiceDictation-${tag}-win-x64-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            VoiceDictation-*.zip
